name: Build and Upload to App Store

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(TZ=Asia/Tokyo date +%Y%m%d%H%M)
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" -E "s/CURRENT_PROJECT_VERSION: \"?[0-9]+\"?/CURRENT_PROJECT_VERSION: \"$BUILD_NUM\"/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Select simulator
      run: |
        SIM_UDID=$(xcrun simctl list devices available --json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(dev["udid"] for runtime in d["devices"].values() for dev in runtime if dev.get("isAvailable") and "iPhone" in dev["name"]))')
        echo "SIM_UDID=$SIM_UDID" >> $GITHUB_ENV
        echo "Using simulator $SIM_UDID"

    - name: Generate App Store screenshots
      run: |
        set -euo pipefail
        xcodebuild build \
          -scheme RuinFilter \
          -configuration Debug \
          -destination "platform=iOS Simulator,id=$SIM_UDID" \
          -derivedDataPath build/ScreenshotDerivedData

        APP_PATH=$(find build/ScreenshotDerivedData/Build/Products/Debug-iphonesimulator -name "RuinFilter.app" -maxdepth 2 | head -1)
        mkdir -p screenshots/raw screenshots/appstore

        capture () {
          DEVICE_NAME="$1"
          PREFIX="$2"
          UDID="$SIM_UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" "$APP_PATH"

          INDEX=1
          for SCREEN in home editor result; do
            xcrun simctl terminate "$UDID" com.tokyonasu.ruinfilter || true
            xcrun simctl launch "$UDID" com.tokyonasu.ruinfilter -screenshots -screenshotScreen "$SCREEN"
            sleep 8
            xcrun simctl io "$UDID" screenshot "screenshots/raw/${PREFIX}_${INDEX}_${SCREEN}.png"
            INDEX=$((INDEX + 1))
          done

          xcrun simctl shutdown "$UDID" || true
        }

        capture "iPhone 17 Pro Max" "iphone"
        cp screenshots/raw/iphone_1_home.png screenshots/raw/ipad_1_home.png
        cp screenshots/raw/iphone_2_editor.png screenshots/raw/ipad_2_editor.png
        cp screenshots/raw/iphone_3_result.png screenshots/raw/ipad_3_result.png

        sips -z 2796 1290 screenshots/raw/iphone_1_home.png --out screenshots/appstore/iphone_1_home.png
        sips -z 2796 1290 screenshots/raw/iphone_2_editor.png --out screenshots/appstore/iphone_2_editor.png
        sips -z 2796 1290 screenshots/raw/iphone_3_result.png --out screenshots/appstore/iphone_3_result.png
        sips -z 2732 2048 screenshots/raw/ipad_1_home.png --out screenshots/appstore/ipad_1_home.png
        sips -z 2732 2048 screenshots/raw/ipad_2_editor.png --out screenshots/appstore/ipad_2_editor.png
        sips -z 2732 2048 screenshots/raw/ipad_3_result.png --out screenshots/appstore/ipad_3_result.png

    - name: Patch Info.plist build number
      run: |
        sed -i "" "s|<string>\$(CURRENT_PROJECT_VERSION)</string>|<string>$BUILD_NUM</string>|" RuinFilter/Info.plist
        sed -i "" "/<key>CFBundleVersion<\/key>/{n;s|<string>[^<]*</string>|<string>$BUILD_NUM</string>|;}" RuinFilter/Info.plist

    - name: Import Distribution Certificate
      env:
        CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        echo "$CERT_BASE64" | base64 -D > cert.p12
        security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        rm cert.p12

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme RuinFilter \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/RuinFilter.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/RuinFilter.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Submit for Review
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
