name: RuinFilter
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.13.0"
targets:
  RuinFilter:
    type: application
    platform: iOS
    sources: [RuinFilter]
    info:
      path: RuinFilter/Info.plist
      properties:
        CFBundleName: 廃墟フィルター
        CFBundleDisplayName: 廃墟フィルター
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        GADApplicationIdentifier: ca-app-pub-9404799280370656~8530663100
        NSUserTrackingUsageDescription: 広告の表示と改善のために使用します。
        NSPhotoLibraryUsageDescription: 写真に廃墟フィルターを適用するために使用します。
        NSCameraUsageDescription: 撮影した写真を廃墟風に加工するために使用します。
        NSPhotoLibraryAddUsageDescription: 加工した写真を保存するために使用します。
        ITSAppUsesNonExemptEncryption: false
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: RuinFilter/Info.plist
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.ruinfilter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
